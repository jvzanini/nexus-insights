name: Build and Push

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ github.sha }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' }}
    env:
      PORTAINER_URL: ${{ secrets.PORTAINER_URL }}
      PORTAINER_TOKEN: ${{ secrets.PORTAINER_TOKEN }}
      PORTAINER_ENDPOINT_ID: ${{ secrets.PORTAINER_ENDPOINT_ID }}
      PORTAINER_STACK_ID: ${{ secrets.PORTAINER_STACK_ID }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
    steps:
      - name: Trigger Portainer redeploy (Swarm-aware)
        run: |
          if [ -z "$PORTAINER_STACK_ID" ]; then
            echo "PORTAINER_STACK_ID não configurado — pulando."
            exit 0
          fi

          set -u
          AUTH=$(printf '{"username":"jvzanini","password":"%s"}' "$GHCR_TOKEN" | base64 | tr -d '\n')

          # 1) Pull explícito da imagem nova no endpoint (assim o force-update
          #    pega a `:latest` recém-buildada).
          curl --silent --insecure -X POST \
            -H "X-API-Key: ${PORTAINER_TOKEN}" \
            -H "X-Registry-Auth: ${AUTH}" \
            "${PORTAINER_URL}/api/endpoints/${PORTAINER_ENDPOINT_ID}/docker/images/create?fromImage=ghcr.io/jvzanini/nexus-insights&tag=latest" \
            -o /tmp/pull.log -w "Pull image: HTTP %{http_code}\n" || true

          # 2) Stack info — usado para descobrir o nome do stack (prefixo dos
          #    services em Swarm).
          STACK_JSON=$(curl --silent --insecure -H "X-API-Key: ${PORTAINER_TOKEN}" \
            "${PORTAINER_URL}/api/stacks/${PORTAINER_STACK_ID}")
          STACK_NAME=$(echo "$STACK_JSON" | python3 -c "import sys, json; print(json.load(sys.stdin).get('Name',''))")
          if [ -z "$STACK_NAME" ]; then
            echo "Falha ao ler nome do stack."; echo "$STACK_JSON" | head -c 500; exit 1
          fi
          SERVICE_NAME="${STACK_NAME}_app"
          echo "Stack: ${STACK_NAME} | Service alvo: ${SERVICE_NAME}"

          # 3) Lê service e força redeploy via ForceUpdate++ no spec atual
          #    (idiomático para Swarm; pega a imagem :latest que acabou de
          #    ser pulled no passo 1).
          FILTER=$(python3 -c "import urllib.parse; print(urllib.parse.quote('{\"name\":[\"$SERVICE_NAME\"]}'))")
          SVC=$(curl --silent --insecure \
            -H "X-API-Key: ${PORTAINER_TOKEN}" \
            "${PORTAINER_URL}/api/endpoints/${PORTAINER_ENDPOINT_ID}/docker/services?filters=${FILTER}")

          SVC_ID=$(echo "$SVC" | python3 -c "import sys, json; d=json.load(sys.stdin); print(d[0]['ID'] if d else '')")
          if [ -z "$SVC_ID" ]; then
            echo "Service ${SERVICE_NAME} não encontrado."; echo "$SVC" | head -c 500; exit 1
          fi

          SVC_VER=$(echo "$SVC" | python3 -c "import sys, json; print(json.load(sys.stdin)[0]['Version']['Index'])")
          NEW_SPEC=$(echo "$SVC" | python3 -c "
import sys, json
spec = json.load(sys.stdin)[0]['Spec']
spec.setdefault('TaskTemplate', {})['ForceUpdate'] = spec.get('TaskTemplate', {}).get('ForceUpdate', 0) + 1
print(json.dumps(spec))
          ")

          echo "Service ${SVC_ID} version ${SVC_VER} — forçando atualização"
          HTTP=$(curl --silent --insecure -o /tmp/upd.log -w "%{http_code}" -X POST \
            -H "X-API-Key: ${PORTAINER_TOKEN}" \
            -H "Content-Type: application/json" \
            -H "X-Registry-Auth: ${AUTH}" \
            "${PORTAINER_URL}/api/endpoints/${PORTAINER_ENDPOINT_ID}/docker/services/${SVC_ID}/update?version=${SVC_VER}" \
            -d "$NEW_SPEC")
          echo "Service update: HTTP ${HTTP}"
          if [ "$HTTP" != "200" ]; then
            echo "--- response ---"; cat /tmp/upd.log; echo ""
            exit 1
          fi
          echo "Redeploy disparado com sucesso."
